services:
  # --- SITO WEB ---
  app:
    build: .
    container_name: skeletron_apache_app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./www:/var/www/html/
    networks:
      - web_network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.skeletron_apache_app.rule=Host(`skeletron-apache.localhost`)"
      - "traefik.http.services.skeletron_apache_app.loadbalancer.server.port=80"
      - "traefik.docker.network=web_network"

  # --- DATABASE ---
  db:
    image: mariadb:latest
    container_name: skeletron_apache_db
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: skeletron_apache
      MARIADB_USER: db_user
      MARIADB_PASSWORD: db_password
    volumes:
      - db_data:/var/lib/mysql
      - ./skeletron_apache.sql:/docker-entrypoint-initdb.d/skeletron_apache.sql
    networks:
      - default

  # --- PHPMYADMIN ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: skeletron_apache_pma
    environment:
      PMA_HOST: skeletron_apache_db
      MYSQL_ROOT_PASSWORD: root_password
    networks:
      - web_network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.skeletron_apache_pma.rule=Host(`db.skeletron-apache.localhost`)"
      - "traefik.http.services.skeletron_apache_pma.loadbalancer.server.port=80"
      - "traefik.docker.network=web_network"

networks:
  web_network:
    external: true

volumes:
  db_data:
